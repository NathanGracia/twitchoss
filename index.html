<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>TwitchOSS</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.13/dist/hls.min.js"></script>
  <style>
    :root {
      --bg-base:    #0e0e10;
      --bg-raised:  #18181b;
      --bg-hover:   #26262c;
      --border:     rgba(255,255,255,0.08);
      --accent:     #9147ff;
      --text:       #efeff1;
      --text-muted: #adadb8;
      --live:       #eb0400;
      --sidebar-w:  240px;
      --chat-w:     340px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg-base);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      height: 100vh;
      overflow: hidden;
    }

    .app {
      display: grid;
      grid-template-columns: var(--sidebar-w) 1fr var(--chat-w);
      height: 100vh;
    }

    /* ── Sidebar ── */
    .sidebar {
      background: var(--bg-raised);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 16px 16px 12px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-size: 17px;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: -0.3px;
    }

    .section-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      padding: 14px 16px 6px;
    }

    .channel-list {
      flex: 1;
      overflow-y: auto;
      padding: 2px 0 8px;
    }

    .channel-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 14px;
      margin: 1px 6px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.1s;
      user-select: none;
    }

    .channel-item:hover  { background: var(--bg-hover); }
    .channel-item.active { background: var(--bg-hover); }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      flex-shrink: 0;
      color: #fff;
    }

    .channel-item.active .avatar { box-shadow: 0 0 0 2px var(--accent); }

    .ch-name {
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .channel-item.active .ch-name { color: var(--accent); }

    .live-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #eb0400;
      flex-shrink: 0;
      margin-left: auto;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .live-dot.on { opacity: 1; }

    .channel-list::-webkit-scrollbar { width: 4px; }
    .channel-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── Main ── */
    .main {
      display: flex;
      flex-direction: column;
      background: #000;
      overflow: hidden;
    }

    .player-wrapper {
      flex: 1;
      position: relative;
      background: #000;
      overflow: hidden;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: none;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      background: #000;
    }

    .overlay-icon { font-size: 52px; opacity: 0.18; line-height: 1; }
    .overlay p    { font-size: 14px; color: var(--text-muted); }

    .spinner {
      width: 44px;
      height: 44px;
      border: 3px solid rgba(145, 71, 255, 0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* info bar */
    .info-bar {
      background: var(--bg-raised);
      border-top: 1px solid var(--border);
      padding: 0 16px;
      height: 44px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .ctrl-btn {
      background: none;
      border: none;
      color: var(--text);
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: color 0.1s;
    }
    .ctrl-btn:hover { color: var(--accent); }
    .ctrl-btn svg   { width: 18px; height: 18px; fill: currentColor; }

    .volume-group {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .volume-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 80px;
      height: 4px;
      border-radius: 2px;
      background: var(--border);
      outline: none;
      cursor: pointer;
    }
    .volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      transition: transform 0.1s;
    }
    .volume-slider:hover::-webkit-slider-thumb { transform: scale(1.3); }

    .separator {
      width: 1px;
      height: 20px;
      background: var(--border);
      flex-shrink: 0;
    }

    .live-badge {
      background: var(--live);
      color: #fff;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.8px;
      padding: 2px 7px;
      border-radius: 3px;
      display: none;
      flex-shrink: 0;
    }

    .live-badge.on  { display: block; }
    .info-channel   { font-size: 14px; font-weight: 700; }
    .info-hint      { font-size: 12px; color: var(--text-muted); }

    /* ── Chat ── */
    .chat-panel {
      background: var(--bg-raised);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }

    .chat-header {
      padding: 0 16px;
      height: 44px;
      display: flex;
      align-items: center;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      flex-shrink: 0;
    }

    #chat-frame {
      flex: 1;
      border: none;
      background: var(--bg-base);
    }
  </style>
</head>
<body>
<div class="app">

  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo">TwitchOSS</div>
    </div>
    <div class="section-label">Chaînes</div>
    <div class="channel-list" id="channel-list"></div>
  </aside>

  <main class="main">
    <div class="player-wrapper">
      <div class="overlay" id="overlay-idle">
        <div class="overlay-icon">▶</div>
        <p>Sélectionne une chaîne</p>
      </div>
      <div class="overlay" id="overlay-loading" style="display:none">
        <div class="spinner"></div>
        <p id="loading-msg">Démarrage du stream…</p>
      </div>
      <div class="overlay" id="overlay-error" style="display:none">
        <div class="overlay-icon">✕</div>
        <p id="error-msg">Chaîne hors ligne ou erreur</p>
      </div>
      <video id="video" playsinline></video>
    </div>
    <div class="info-bar">
      <!-- Play/Pause -->
      <button class="ctrl-btn" id="btn-playpause" onclick="togglePlay()" title="Espace">
        <svg id="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        <svg id="icon-pause" viewBox="0 0 24 24" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
      </button>

      <!-- Volume -->
      <div class="volume-group">
        <button class="ctrl-btn" id="btn-mute" onclick="toggleMute()" title="M">
          <svg id="icon-vol" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
          <svg id="icon-mute" viewBox="0 0 24 24" style="display:none"><path d="M16.5 12A4.5 4.5 0 0 0 14 7.97v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06A8.99 8.99 0 0 0 17.73 19l2 2L21 19.73l-18-18zM12 4L9.91 6.09 12 8.18V4z"/></svg>
        </button>
        <input class="volume-slider" id="volume-slider" type="range" min="0" max="1" step="0.02" value="1" oninput="setVolume(this.value)">
      </div>

      <div class="separator"></div>

      <span class="live-badge" id="live-badge">EN DIRECT</span>
      <span class="info-channel" id="info-channel">—</span>
      <span class="info-hint" id="info-hint"></span>
    </div>
  </main>

  <aside class="chat-panel">
    <div class="chat-header">
      Chat
      <button id="btn-popout-chat" class="ctrl-btn" style="margin-left:auto" title="Ouvrir avec 7TV" data-channel="" onclick="popoutChat()">
        <svg viewBox="0 0 24 24" style="width:14px;height:14px;fill:currentColor"><path d="M19 19H5V5h7V3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7h-2v7zM14 3v2h3.59l-9.83 9.83 1.41 1.41L19 6.41V10h2V3h-7z"/></svg>
      </button>
    </div>
    <iframe id="chat-frame" src="" allowtransparency="true"></iframe>
  </aside>

</div>
<script>
  let hls = null;
  let _channels = [];
  let _info = {};
  let _activeChannel = null;

  function showOverlay(name, msg) {
    ['idle', 'loading', 'error'].forEach(id => {
      document.getElementById('overlay-' + id).style.display = id === name ? 'flex' : 'none';
    });
    document.getElementById('video').style.display = name === 'none' ? 'block' : 'none';
    if (msg) document.getElementById('error-msg').textContent = msg;
  }

  function setLive(on) {
    document.getElementById('live-badge').classList.toggle('on', on);
  }

  function destroyHls() {
    if (hls) { hls.destroy(); hls = null; }
    const v = document.getElementById('video');
    v.removeAttribute('src');
    v.load();
  }

  function renderChannelList() {
    const sorted = [..._channels].sort((a, b) => {
      const la = _info[a]?.live ? 1 : 0;
      const lb = _info[b]?.live ? 1 : 0;
      return lb - la;
    });

    document.getElementById('channel-list').innerHTML = sorted.map(ch => {
      const hue = [...ch].reduce((a, c) => a + c.charCodeAt(0), 0) % 360;
      const info = _info[ch];
      const isLive = info?.live ?? false;
      const isActive = ch === _activeChannel;
      const avatarContent = info?.avatar
        ? `<img src="${info.avatar}" alt="${ch}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;" onerror="this.style.display='none'">`
        : ch[0].toUpperCase();
      return `<div class="channel-item${isActive ? ' active' : ''}" data-ch="${ch}" onclick="selectChannel('${ch}')">
        <div class="avatar" id="av-${ch}" style="background:hsl(${hue},60%,45%)">${avatarContent}</div>
        <span class="ch-name">${ch}</span>
        <span class="live-dot${isLive ? ' on' : ''}" id="dot-${ch}"></span>
      </div>`;
    }).join('');
  }

  async function loadChannels() {
    _channels = await fetch('/channels').then(r => r.json());
    renderChannelList();
    fetchChannelInfo();
  }

  async function fetchChannelInfo() {
    try {
      _info = await fetch('/channel-info').then(r => r.json());
      renderChannelList();
    } catch {}
    setTimeout(fetchChannelInfo, 120_000);
  }

  async function selectChannel(channel) {
    _activeChannel = channel;
    document.querySelectorAll('.channel-item').forEach(el =>
      el.classList.toggle('active', el.dataset.ch === channel)
    );
    document.getElementById('info-channel').textContent = channel;
    document.getElementById('info-hint').textContent = '';
    setLive(false);
    destroyHls();
    showOverlay('loading');

    document.getElementById('chat-frame').src =
      `https://www.twitch.tv/embed/${channel}/chat?parent=${location.hostname}&darkpopout`;
    document.getElementById('btn-popout-chat').dataset.channel = channel;

    // Demarre streamlink + ffmpeg côté serveur
    await fetch(`/start/${channel}`);

    // Attend que le premier segment HLS soit écrit sur disque
    document.getElementById('loading-msg').textContent = 'Génération du flux HLS…';
    const ready = await waitForPlaylist();
    if (!ready) {
      showOverlay('error', 'Chaîne hors ligne ou timeout');
      return;
    }

    startHls();
  }

  async function waitForPlaylist() {
    for (let i = 0; i < 30; i++) {
      try {
        const r = await fetch(`${location.origin}/hls/playlist.m3u8`, { cache: 'no-store' });
        if (r.ok) return true;
      } catch {}
      await new Promise(r => setTimeout(r, 500));
    }
    return false;
  }

  function startHls() {
    const video = document.getElementById('video');
    const src   = `${location.origin}/hls/playlist.m3u8`;

    if (Hls.isSupported()) {
      hls = new Hls({
        liveSyncDurationCount:     3,
        liveMaxLatencyDurationCount: 6,
        lowLatencyMode:            false,
        enableWorker:              true,
      });

      hls.loadSource(src);
      hls.attachMedia(video);

      hls.on(Hls.Events.MANIFEST_PARSED, () => {
        showOverlay('none');
        setLive(true);
        document.getElementById('info-hint').textContent = '';
        video.play().catch(() => {});
      });

      hls.on(Hls.Events.ERROR, (_, data) => {
        if (data.fatal) {
          console.error('[hls] fatal error:', data);
          showOverlay('error', 'Erreur de lecture');
          setLive(false);
        }
      });

    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      // Safari
      video.src = src;
      video.addEventListener('loadedmetadata', () => {
        showOverlay('none');
        setLive(true);
        video.play();
      }, { once: true });
    } else {
      showOverlay('error', 'Navigateur non supporté');
    }
  }

  // ── Contrôles ──────────────────────────────────────
  function togglePlay() {
    const v = document.getElementById('video');
    if (v.paused) v.play(); else v.pause();
  }

  function toggleMute() {
    const v = document.getElementById('video');
    v.muted = !v.muted;
    updateVolumeUI(v);
  }

  function setVolume(val) {
    const v = document.getElementById('video');
    v.volume = val;
    v.muted  = (val == 0);
    updateVolumeUI(v);
  }

  function updateVolumeUI(v) {
    const muted = v.muted || v.volume === 0;
    document.getElementById('icon-vol').style.display  = muted ? 'none' : '';
    document.getElementById('icon-mute').style.display = muted ? '' : 'none';
    if (!muted) document.getElementById('volume-slider').value = v.volume;
  }

  function updatePlayUI(v) {
    document.getElementById('icon-play').style.display  = v.paused ? '' : 'none';
    document.getElementById('icon-pause').style.display = v.paused ? 'none' : '';
  }

  document.getElementById('video').addEventListener('play',  () => updatePlayUI(document.getElementById('video')));
  document.getElementById('video').addEventListener('pause', () => updatePlayUI(document.getElementById('video')));

  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT') return;
    const v = document.getElementById('video');
    if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
    if (e.code === 'KeyM')  { toggleMute(); }
    if (e.code === 'ArrowUp')   { e.preventDefault(); setVolume(Math.min(1, v.volume + 0.1)); }
    if (e.code === 'ArrowDown') { e.preventDefault(); setVolume(Math.max(0, v.volume - 0.1)); }
  });

  function popoutChat() {
    const ch = document.getElementById('btn-popout-chat').dataset.channel;
    if (ch) window.open(`https://www.twitch.tv/popout/${ch}/chat?popout=`, '_blank', 'width=340,height=700');
  }

  // ───────────────────────────────────────────────────
  loadChannels();
  showOverlay('idle');
</script>
</body>
</html>
